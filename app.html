<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Humor Repository | WakeUpSheeple.org</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #cc2200;
      --dark: #111111;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #cccccc;
      --dim: #666666;
      --yellow: #e8c84a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 40px,
        rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px
      );
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: #0a0a0a;
      border-bottom: 2px solid var(--red);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a { color: #aaa; text-decoration: none; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
    nav a:hover { color: var(--yellow); }
    nav .brand { color: var(--red); font-size: 1.2rem; font-family: 'Special Elite', serif; }

    /* HEADER */
    header {
      text-align: center;
      padding: 60px 24px 40px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'Special Elite', serif;
      font-size: 2.4rem;
      color: white;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    header p {
      color: var(--dim);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 1px;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    /* TYPE SELECTOR */
    .type-selector {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .type-btn {
      background: var(--card);
      color: var(--dim);
      border: none;
      padding: 12px 32px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border-right: 1px solid var(--border);
    }
    .type-btn:last-child { border-right: none; }
    .type-btn.active { background: var(--red); color: white; }
    .type-btn:hover:not(.active) { background: #222; color: var(--text); }

    /* CARD */
    .content-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: 2px;
      padding: 40px;
      width: 100%;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
    }

    .content-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--red);
      margin-bottom: 20px;
    }

    .content-text {
      font-family: 'Special Elite', serif;
      font-size: 1.25rem;
      color: white;
      line-height: 1.8;
      min-height: 60px;
    }

    .answer-divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 20px 0;
    }

    .answer-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--yellow);
      margin-bottom: 12px;
    }

    .answer-text {
      font-family: 'Special Elite', serif;
      font-size: 1.1rem;
      color: var(--yellow);
      line-height: 1.7;
      min-height: 40px;
    }

    .reveal-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 8px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 12px;
      align-self: flex-start;
      transition: all 0.2s;
      border-radius: 2px;
    }
    .reveal-btn:hover { color: var(--yellow); border-color: var(--yellow); }

    /* GENERATE BTN */
    .generate-btn {
      background: var(--red);
      color: white;
      border: none;
      padding: 16px 48px;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      width: 100%;
      max-width: 320px;
    }
    .generate-btn:hover { background: #aa1a00; transform: translateY(-1px); }
    .generate-btn:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

    .loading-text {
      color: var(--dim);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 16px;
      min-height: 20px;
      text-align: center;
    }

    /* COUNTER */
    .counter {
      margin-top: 32px;
      color: var(--dim);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* FOOTER */
    footer {
      background: #0a0a0a;
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--dim);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    footer a { color: var(--red); text-decoration: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>

<nav>
  <a href="scratch.html" class="brand">⬅ WakeUpSheeple.org</a>
  <a href="index.html">Professional Site</a>
</nav>

<header>
  <h1>The Humor Repository</h1>
  <p>Press the button. Something will appear.</p>
</header>

<main>
  <div class="type-selector">
    <button class="type-btn active" onclick="setType('both', this)">Both</button>
    <button class="type-btn" onclick="setType('joke', this)">Jokes</button>
    <button class="type-btn" onclick="setType('riddle', this)">Riddles</button>
  </div>

  <div class="content-card" id="content-card">
    <div class="content-label" id="content-label">Awaiting Request</div>
    <div class="content-text" id="content-text" style="color: var(--dim); font-size:1rem;">
      Press the button below. Something will appear. Whether it is funny is not guaranteed.
    </div>
    <div id="riddle-section" style="display:none;">
      <hr class="answer-divider"/>
      <div class="answer-label">Answer</div>
      <div class="answer-text" id="answer-text" style="filter: blur(6px); transition: filter 0.3s;"></div>
      <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>
    </div>
  </div>

  <button class="generate-btn" id="gen-btn" onclick="generate()">Generate</button>
  <div class="loading-text" id="loading-text"></div>
  <div class="counter" id="counter"></div>
</main>

<footer>
  <p>Part of <a href="scratch.html">WakeUpSheeple.org</a> &nbsp;|&nbsp; <a href="index.html">Professional Site</a></p>
</footer>

<script>
  let currentType = 'both';
  let generateCount = 0;

  const fallbackJokes = [
    "I told my doctor I broke my arm in two places. He told me to stop going to those places.",
    "A skeleton walks into a bar. Orders a beer. And a mop.",
    "I asked my dog what two minus two is. He said nothing.",
    "My therapist told me I have trouble accepting things I can't change. I said I know, I hate it.",
    "I bought some shoes from a drug dealer. I don't know what he laced them with, but I was tripping all day.",
    "I have a lot of growing up to do. I realized that the other day inside my fort.",
    "My boss told me to have a good day. So I went home.",
    "I used to hate facial hair but then it grew on me.",
    "I told my wife she should embrace her mistakes. She gave me a hug.",
    "The cemetery raised its prices and blamed the cost of living."
  ];

  const fallbackRiddles = [
    { q: "I have cities, but no houses live there. I have mountains, but no trees grow there. I have water, but no fish swim there. What am I?", a: "A map." },
    { q: "The more you take, the more you leave behind. What am I?", a: "Footsteps." },
    { q: "I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. What am I?", a: "An echo." },
    { q: "What has hands but cannot clap?", a: "A clock." },
    { q: "I have a head, a tail, but no body. What am I?", a: "A coin." },
    { q: "What gets wetter the more it dries?", a: "A towel." },
    { q: "I can fly without wings. I can cry without eyes. Wherever I go, darkness follows me. What am I?", a: "A cloud." },
    { q: "What comes once in a minute, twice in a moment, but never in a thousand years?", a: "The letter M." }
  ];

  function setType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function revealAnswer() {
    document.getElementById('answer-text').style.filter = 'none';
    document.getElementById('reveal-btn').style.display = 'none';
  }

  function showContent(type, content, answer) {
    const label = document.getElementById('content-label');
    const text = document.getElementById('content-text');
    const riddleSection = document.getElementById('riddle-section');
    const answerText = document.getElementById('answer-text');
    const revealBtn = document.getElementById('reveal-btn');

    label.textContent = type === 'joke' ? 'Joke' : 'Riddle';
    text.textContent = content;
    text.style.color = 'white';
    text.classList.remove('fade-in');
    void text.offsetWidth;
    text.classList.add('fade-in');

    if (type === 'riddle' && answer) {
      answerText.textContent = answer;
      answerText.style.filter = 'blur(6px)';
      revealBtn.style.display = 'inline-block';
      riddleSection.style.display = 'block';
    } else {
      riddleSection.style.display = 'none';
    }

    generateCount++;
    document.getElementById('counter').textContent = `${generateCount} item${generateCount !== 1 ? 's' : ''} generated this session`;
    document.getElementById('loading-text').textContent = '';
    document.getElementById('gen-btn').disabled = false;
  }

  async function generate() {
    const btn = document.getElementById('gen-btn');
    const loading = document.getElementById('loading-text');
    const text = document.getElementById('content-text');
    const riddleSection = document.getElementById('riddle-section');

    btn.disabled = true;
    loading.textContent = 'Consulting the archives...';
    text.style.color = 'var(--dim)';
    text.textContent = '';
    riddleSection.style.display = 'none';

    const typePrompt = currentType === 'both'
      ? 'randomly choose to generate either a joke or a riddle (your choice)'
      : currentType === 'joke'
      ? 'generate a joke'
      : 'generate a riddle with an answer';

    const prompt = `You are a deadpan, dry humor generator. ${typePrompt}.

Rules:
- Tone must be completely dry and deadpan. No exclamation points. No enthusiastic energy.
- If it's a joke: setup and punchline format. The punchline should land quietly.
- If it's a riddle: provide the riddle and the answer separately.
- Keep it short. One or two sentences max.
- Do not introduce yourself. Do not add commentary. Just the content.

Respond ONLY in this JSON format with no extra text or markdown:
{
  "type": "joke" or "riddle",
  "content": "the joke or riddle text here",
  "answer": "the answer if riddle, or null if joke"
}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!response.ok) throw new Error('API error');

      const data = await response.json();
      const raw = data.content.map(i => i.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      showContent(parsed.type, parsed.content, parsed.answer);

    } catch (err) {
      // Fallback to local content when offline or API unavailable
      let type, content, answer = null;
      const useRiddle = currentType === 'riddle' || (currentType === 'both' && Math.random() > 0.5);

      if (useRiddle) {
        type = 'riddle';
        const pick = fallbackRiddles[Math.floor(Math.random() * fallbackRiddles.length)];
        content = pick.q;
        answer = pick.a;
      } else {
        type = 'joke';
        content = fallbackJokes[Math.floor(Math.random() * fallbackJokes.length)];
      }
      showContent(type, content, answer);
    }
  }
</script>

</body>
</html>
